[project]
name = "comfygit-env-deforum-revamp"
version = "0.1.0"
requires-python = "==3.12.*"
dependencies = [
    "aiohttp>=3.11.8",
    "alembic",
    "av>=14.2.0",
    "blake3",
    "comfy-aimdo==0.3.0",
    "comfy-kitchen>=0.2.8",
    "comfyui-embedded-docs==0.4.4",
    "comfyui-frontend-package==1.43.18",
    "comfyui-workflow-templates==0.9.73",
    "einops",
    "filelock",
    "glfw",
    "kornia>=0.7.1",
    "numpy>=1.25.0",
    "pillow",
    "psutil",
    "pydantic~=2.0",
    "pydantic-settings~=2.0",
    "pyopengl",
    "pyyaml",
    "requests",
    "safetensors>=0.4.2",
    "scipy",
    "sentencepiece",
    "simpleeval>=1.0.0",
    "spandrel",
    "sqlalchemy>=2.0.0",
    "tokenizers>=0.13.3",
    "torch",
    "torchaudio",
    "torchsde",
    "torchvision",
    "tqdm",
    "transformers>=4.50.3",
    "yarl>=1.18.0",
]

[tool.comfygit]
schema_version = 2
comfyui_version = "v0.21.0"
comfyui_version_type = "release"
comfyui_commit_sha = "52976f3ea33cc2312c7b5a32e1c7510b203eefb6"
python_version = "3.12"

[tool.comfygit.nodes.comfygit-manager]
name = "comfygit-manager"
registry_id = "comfygit-manager"
repository = "https://github.com/comfygit-ai/comfygit-manager"
version = "0.1.1"
download_url = "https://cdn.comfy.org/akatz/comfygit-manager/0.1.1/node.zip"
source = "registry"
criticality = "required"
[tool.uv]
override-dependencies = ["uv>=0.11.8"]
exclude-dependencies = ["opencv-contrib-python", "opencv-python", "opencv-python-headless"]

[dependency-groups]
comfygit-manager-b2d41ad7 = [
    "comfygit-core==0.4.0",
    "watchdog>=6.0.0",
    "xxhash>=3.5.0",
    "zeroconf>=0.131.0",
]
comfygit-system = ["uv>=0.11.8"]
